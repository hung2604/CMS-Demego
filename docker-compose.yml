# CMS-Demego — Portainer / Docker Compose
# Image cố định: roseluren26/tnp:cms
# Điền biến môi trường Studio + Git (file .env hoặc Portainer)

services:
  cms-demego:
    image: roseluren26/tnp:cms
    container_name: cms-demego
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3000"
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: "3000"

      STUDIO_GITHUB_CLIENT_ID: ${STUDIO_GITHUB_CLIENT_ID}
      STUDIO_GITHUB_CLIENT_SECRET: ${STUDIO_GITHUB_CLIENT_SECRET}
      # STUDIO_GITHUB_MODERATORS: "admin@company.com"

      STUDIO_REPO_OWNER: ${STUDIO_REPO_OWNER}
      STUDIO_REPO_NAME: ${STUDIO_REPO_NAME}
      STUDIO_REPO_BRANCH: ${STUDIO_REPO_BRANCH:-main}

      # BLOB_READ_WRITE_TOKEN: ${BLOB_READ_WRITE_TOKEN}
      # STUDIO_MEDIA_MAX_BYTES: "524288000"
